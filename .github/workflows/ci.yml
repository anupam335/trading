name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Use explicit, supported Python versions to avoid ambiguous parsing (avoid '3.1' being interpreted).
        python-version: ["3.10.x", "3.11.x", "3.12.x"]
    steps:
      - uses: actions/checkout@v4
      - name: Run Pine validation
        run: |
          chmod +x ./scripts/validate_pine.sh
          ./scripts/validate_pine.sh
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
